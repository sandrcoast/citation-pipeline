# docker-compose.yml — Citation pipeline stack
#
# Services:
#   - ollama:     LLM backend (Gemma 3)
#   - middleware: Citation extraction proxy (FastAPI + embedded ChromaDB)
#
# Quick start:
#   docker-compose up -d
#   docker exec -it citation-pipeline-ollama-1 ollama pull gemma3:1b
#   docker exec -it citation-pipeline-ollama-1 ollama create gemma3-1b-cite -f /modelfiles/Modelfile
#
# Then point your client to http://localhost:8000 instead of :11434

version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama_patch:/modelfiles
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  middleware:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma3:1b
      - CHROMA_PERSIST_DIR=/app/data/chromadb
    volumes:
      - chroma_data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
